kind: "Macro"
title: "Youtube"
description: "Stream a video directly from your website"
form:
  - type: "TextLine"
    name: "title"
    label: "Title"
    helpText: "\n        A title that is added to the iframe\n      "
    occurrences:
      min: 0
      max: 1
    regexp: "^(?!.*[\\\"\\u003E\\u003C\\']).*"
  - type: "TextLine"
    name: "url"
    label: "Url"
    occurrences:
      min: 1
      max: 1
    regexp: "^(https:\\/\\/|http:\\/\\/)?(www\\.)?(m\\.)?(youtu\\.be\\/|youtube\\\
      .com\\/)(.)+"
